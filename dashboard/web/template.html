// ── UTILS ────────────────────────────────────────────────────────────────────
function rankField(arr, field, hi=true) {
  const vals = arr.map(p=>p[field]).sort((a,b)=>a-b);
  return arr.map(p => {
    const idx = vals.indexOf(p[field]);
    const pct = idx/(vals.length-1)*100;
    return hi ? pct : 100-pct;
  });
}

// ── OLS regression ───────────────────────────────────────────────────────────
function ols(xs, ys) {
  const n = xs.length;
  if (n < 2) return {slope:0, intercept:0, r2:0, r:0};
  const mX = xs.reduce((a,b)=>a+b,0)/n;
  const mY = ys.reduce((a,b)=>a+b,0)/n;
  const ssXX = xs.reduce((s,x)=>s+(x-mX)**2, 0);
  const ssXY = xs.reduce((s,x,i)=>s+(x-mX)*(ys[i]-mY), 0);
  const ssYY = ys.reduce((s,y)=>s+(y-mY)**2, 0);
  const slope = ssXX > 0 ? ssXY/ssXX : 0;
  const intercept = mY - slope*mX;
  const r2 = (ssXX > 0 && ssYY > 0) ? ssXY**2/(ssXX*ssYY) : 0;
  const r  = (ssXX > 0 && ssYY > 0) ? ssXY/Math.sqrt(ssXX*ssYY) : 0;
  return {slope, intercept, r2, r};
}

const lerp = (a,b,t) => a+(b-a)*t;
function pctBg(pct) {
  const t = clamp(pct,0,100)/100;
  if (t<0.5) { const s=t*2; return `rgb(${Math.round(lerp(214,255,s))},${Math.round(lerp(40,255,s))},${Math.round(lerp(40,255,s))})`; }
  const s=(t-0.5)*2;
  return `rgb(${Math.round(lerp(255,29,s))},${Math.round(lerp(255,100,s))},${Math.round(lerp(255,220,s))})`;
}
function pctFg(pct) { return (pct<18||pct>82)?'#fff':'#222'; }
const fmt = (v,d=2) => v==null?'—':(v>0?'+':'')+Number(v).toFixed(d);
const fmtNoSign = (v,d=2) => v==null?'—':Number(v).toFixed(d);
const fmtBreak = (v) => v==null?'Never':v>200?'>200s':v+'s';
const overuseCount = CHARTED.filter(p=>p.flagged).length;
const avgDecay = CHARTED.length ? (CHARTED.reduce((s,p)=>s+p.decay_coef,0)/CHARTED.length) : 0;
const medBreak = CHARTED.filter(p=>p.breakeven!=null).map(p=>p.breakeven).sort((a,b)=>a-b);

// ── DECAY CURVE CHART ─────────────────────────────────────────────────────────
// Smoothed empirical trend + league P25/P75 band as context baseline.
// Y-axis auto-scales to fit the player curve; league band anchors the eye.
function catmullRomPath(pts) {
  if (pts.length === 0) return '';
  if (pts.length === 1) return `M ${pts[0][0]} ${pts[0][1]}`;
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[Math.max(0, i-2)];
    const p1 = pts[i-1];
    const p2 = pts[i];
    const p3 = pts[Math.min(pts.length-1, i+1)];
    const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
    const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
    const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
    const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`;
  }
  return d;
}

const DecayCurveChart = ({buckets, values, rapmObs, rapmAges, leagueP25, leagueP75, leagueMed, width=600, height=240}) => {
  const m = {top:18, right:20, bottom:44, left:48};
  const W = width - m.left - m.right;
  const H = height - m.top - m.bottom;

  const xMax = (buckets && buckets.length > 0) ? Math.max(Math.max(...buckets), 80) : 80;
  const xTicks = [];
  for (let t = 0; t <= xMax; t += 10) xTicks.push(t);

  // Y range: fit player data + league band, always show at least ±2 around median
  const allV = [
    ...(values || []),
    ...(leagueP25 || []),
    ...(leagueP75 || []),
  ].filter(v => v != null && isFinite(v));
  const rawMin = Math.min(...allV);
  const rawMax = Math.max(...allV);
  const span   = Math.max(rawMax - rawMin, 3);
  const pad    = span * 0.18;
  const yMin   = Math.floor(rawMin - pad);
  const yMax   = Math.ceil(rawMax  + pad);
  const range  = yMax - yMin;
  const step   = range <= 4 ? 1 : range <= 8 ? 2 : range <= 16 ? 4 : 5;
  const yTicks = [];
  for (let v = Math.ceil(yMin/step)*step; v <= yMax; v += step) yTicks.push(v);

  const xS    = t => (t / xMax) * W;
  const yS    = v => H - ((v - yMin) / (yMax - yMin)) * H;
  const clamp = v => Math.max(yMin, Math.min(yMax, v));
  const uid   = Math.random().toString(36).slice(2,8);
  const clipId = `cc-${uid}`;

  const pts       = (buckets || []).map((t, i) => [xS(t), yS(clamp(values[i]))]);
  const curvePath = catmullRomPath(pts);

  // league band path: P25 forward then P75 backward (league data only covers 0-80)
  const bandPath = (leagueP25 && leagueP75 && leagueP25.length > 1)
    ? AGES.map((t,i) => `${i?'L':'M'} ${xS(t)} ${yS(clamp(leagueP25[i]))}`).join(' ')
      + ' ' + [...AGES].reverse().map((t,i) => `L ${xS(t)} ${yS(clamp(leagueP75[AGES.length-1-i]))}`).join(' ')
      + ' Z'
    : '';

  const medPath = (leagueMed && leagueMed.length > 1)
    ? AGES.map((t,i) => `${i?'L':'M'} ${xS(t)} ${yS(clamp(leagueMed[i]))}`).join(' ')
    : '';

  return (
    <div>
      <svg width={width} height={height} style={{display:'block', overflow:'hidden'}}>
        <defs>
          <clipPath id={clipId}><rect x={0} y={0} width={W} height={H}/></clipPath>
        </defs>
        <g transform={`translate(${m.left},${m.top})`}>
          {yTicks.map(v => (
            <g key={v}>
              <line x1={0} y1={yS(v)} x2={W} y2={yS(v)} stroke="#f0f0f0" strokeWidth={1}/>
              <text x={-8} y={yS(v)+4} textAnchor="end" fontSize="11" fill="#bbb" fontFamily="IBM Plex Mono">{v>0?`+${v}`:v}</text>
            </g>
          ))}
          <text x={-34} y={H/2} textAnchor="middle" fontSize="12" fill="#aaa"
            transform={`rotate(-90,-34,${H/2})`}>xGD/60</text>

          <g clipPath={`url(#${clipId})`}>
            {/* league P25–P75 band */}
            {bandPath && <path d={bandPath} fill="rgba(0,0,0,0.06)"/>}
            {/* league median */}
            {medPath  && <path d={medPath}  stroke="#bbb" strokeWidth="1" strokeDasharray="4 3" fill="none"/>}

            {/* avg-shift reference */}
            <line x1={xS(45)} y1={0} x2={xS(45)} y2={H} stroke="#ebebeb" strokeDasharray="3 3" strokeWidth="1"/>
            <text x={xS(45)+4} y={12} fontSize="9" fill="#ccc" fontFamily="IBM Plex Mono">avg shift</text>

            {/* RAPM model */}
            {rapmObs && rapmAges && rapmObs.length > 0 && (
              <path d={rapmObs.map((v,i) => `${i?'L':'M'} ${xS(rapmAges[i])} ${yS(clamp(v))}`).join(' ')}
                stroke="#8b5cf6" strokeWidth="1.5" strokeDasharray="5 3" fill="none" opacity="0.6"/>
            )}

            {/* smooth player trend line */}
            {curvePath && (
              <path d={curvePath} stroke="#1d4ed8" strokeWidth="2.5" fill="none" strokeLinejoin="round"/>
            )}

            {/* empirical dots */}
            {buckets && values && buckets.map((t,i) => {
              const v = values[i];
              if (v == null || !isFinite(v)) return null;
              return <circle key={i} cx={xS(t)} cy={yS(clamp(v))} r="4.5" fill="#1d4ed8" stroke="#fff" strokeWidth="1.5"/>;
            })}
          </g>

          {xTicks.map(t => (
            <text key={t} x={xS(t)} y={H+16} textAnchor="middle" fontSize="11" fill="#bbb" fontFamily="IBM Plex Mono">{t}</text>
          ))}
          <text x={W/2} y={H+32} textAnchor="middle" fontSize="12" fill="#aaa">Shift age (seconds)</text>
        </g>
      </svg>
      <div style={{display:'flex',gap:16,alignItems:'center',paddingLeft:m.left,marginTop:4,fontSize:10,color:'#aaa'}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#1d4ed8" strokeWidth="2.5"/></svg>
          player xGD/60
        </span>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="20" height="10"><rect x="0" y="2" width="20" height="6" fill="rgba(0,0,0,0.08)" rx="1"/>
            <line x1="0" y1="5" x2="20" y2="5" stroke="#bbb" strokeWidth="1" strokeDasharray="3 2"/></svg>
          league P25–P75
        </span>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#8b5cf6" strokeWidth="1.5" strokeDasharray="4 2"/></svg>
          RAPM model
        </span>
      </div>
    </div>
  );
};

// ── HISTOGRAM (decay coef distribution) ──────────────────────────────────────
const Histogram = ({players, width=360, height=190}) => {
  const m = {top:12,right:12,bottom:50,left:48};
  const W = width-m.left-m.right, H = height-m.top-m.bottom;
  const vals = players.map(p=>p.decay_coef);
  const min=-0.0008, max=0.0005, bins=14;
  const step=(max-min)/bins;
  const counts = Array(bins).fill(0);
  vals.forEach(v=>{ const i=Math.min(bins-1,Math.floor((v-min)/step)); if(i>=0) counts[i]++; });
  const maxC=Math.max(...counts);
  const xS=i=>(i/bins)*W, yS=c=>H-(c/maxC)*H;
  const barW=W/bins-1;
  const pcts = counts.map((_,i)=>((min+(i+0.5)*step-min)/(max-min)*100));
  return (
    <svg width={width} height={height}>
      <g transform={`translate(${m.left},${m.top})`}>
        <line x1={0} y1={H} x2={W} y2={H} stroke="#ddd"/>
        {counts.map((c,i)=>(
          <rect key={i} x={xS(i)+0.5} y={yS(c)} width={barW} height={H-yS(c)} fill={pctBg(pcts[i])} opacity="0.9"/>
        ))}
        {/* zero line */}
        <line x1={((-min)/(max-min))*W} y1={0} x2={((-min)/(max-min))*W} y2={H+4} stroke="#c00" strokeWidth="1.5" strokeDasharray="4 2"/>
        <text x={((-min)/(max-min))*W} y={H+16} textAnchor="middle" fontSize="10" fill="#c00" fontFamily="IBM Plex Mono">0</text>
        {[-0.0006,-0.0003,0,0.0003].map((v,i)=>(
          <text key={i} x={((v-min)/(max-min))*W} y={H+28} textAnchor="middle" fontSize="10" fill="#999" fontFamily="IBM Plex Mono">{v.toFixed(4)}</text>
        ))}
        {[0,Math.round(maxC/2),maxC].map((c,i)=>(
          <text key={i} x={-6} y={yS(c)+4} textAnchor="end" fontSize="10" fill="#aaa" fontFamily="IBM Plex Mono">{c}</text>
        ))}
        {/* axis labels */}
        <text x={W/2} y={H+44} textAnchor="middle" fontSize="11" fill="#666" fontFamily="IBM Plex Sans, sans-serif">Decay coefficient (per second of shift age)</text>
        <text x={-36} y={H/2} textAnchor="middle" fontSize="11" fill="#666" fontFamily="IBM Plex Sans, sans-serif" transform={`rotate(-90,-36,${H/2})`}>Players</text>
      </g>
    </svg>
  );
};

// ── SCATTER (Base RAPM vs Decay) ──────────────────────────────────────────────
const ScatterPlot = ({players, onSelect, reg, width=360, height=190}) => {
  const [tip, setTip] = React.useState(null);
  const m = {top:12,right:12,bottom:50,left:52};
  const W=width-m.left-m.right, H=height-m.top-m.bottom;
  const xs=players.map(p=>p.decay_coef), ys=players.map(p=>p.base_rapm);
  const xMin=Math.min(...xs)-0.00005, xMax=Math.max(...xs)+0.00005;
  const yMin=Math.min(...ys)-0.005, yMax=Math.max(...ys)+0.005;
  const xS=v=>((v-xMin)/(xMax-xMin))*W;
  const yS=v=>H-((v-yMin)/(yMax-yMin))*H;
  const rl_y1 = reg.slope*xMin + reg.intercept;
  const rl_y2 = reg.slope*xMax + reg.intercept;

  const handleMove = (e, p) => {
    const rect = e.currentTarget.closest('svg').getBoundingClientRect();
    setTip({p, x: e.clientX - rect.left, y: e.clientY - rect.top});
  };

  return (
    <div style={{position:'relative',display:'inline-block'}}>
      <svg width={width} height={height} style={{cursor:'crosshair'}} onMouseLeave={()=>setTip(null)}>
        <g transform={`translate(${m.left},${m.top})`}>
          <line x1={0} y1={yS(0)} x2={W} y2={yS(0)} stroke="#eee"/>
          <line x1={xS(0)} y1={0} x2={xS(0)} y2={H} stroke="#ddd" strokeDasharray="4 2"/>
          <line x1={xS(xMin)} y1={yS(rl_y1)} x2={xS(xMax)} y2={yS(rl_y2)}
            stroke="#8b5cf6" strokeWidth="1.8" strokeDasharray="6 3" opacity="0.85"/>
          {players.map(p=>(
            <circle key={p.id} cx={xS(p.decay_coef)} cy={yS(p.base_rapm)} r="5"
              fill={p.flagged?'#dc2626':'#1d4ed8'} opacity="0.7" stroke="#fff" strokeWidth="1"

const ZONE_LABELS = {O:'Off. zone', N:'Neutral', D:'Def. zone'};
const ZONE_COLORS = {O:'#dcfce7', N:'#f3f4f6', D:'#fee2e2'};
const ZONE_TEXT   = {O:'#166534', N:'#555', D:'#991b1b'};

function fmtPeriod(p) { return p > 3 ? 'OT' : `P${p}`; }
function fmtTime(sec) {
  const s = sec % 1200;
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function fmtScore(n) {
  if (n === 0) return <span style={{color:'#888'}}>Tied</span>;
  return n > 0
    ? <span style={{color:'#166534'}}>Up {n > 1 ? n : ''}</span>
    : <span style={{color:'#991b1b'}}>Down {n < -1 ? Math.abs(n) : ''}</span>;
}

  const [expanded, setExpanded] = React.useState(null);
  const [minDur, setMinDur]     = React.useState(10);
  const PAGE = 50;

  const load = () => {
    setLoading(true);
    fetch(`/player/${player.id}/stints?season=${season}`)
      .then(r => r.json())
      .then(d => { setStints(d.stints || []); setLoading(false); })
      .catch(() => { setStints([]); setLoading(false); });
  };

  const toggleSort = col => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('desc'); }
    setPage(0);
  };

  if (!stints) {
    return (
      <div style={{textAlign:'center',padding:'24px 0'}}>
        <button onClick={load} disabled={loading} style={{
          background:'#1d4ed8', color:'#fff', border:'none', borderRadius:5,
          padding:'10px 24px', fontSize:13, fontWeight:600, cursor:'pointer',
          opacity: loading ? 0.6 : 1,
        }}>{loading ? 'Loading…' : `Load shifts`}</button>
        <div style={{fontSize:11,color:'#aaa',marginTop:6}}>Individual 5v5 player shifts (consecutive on-ice sequences grouped together)</div>
      </div>
    );
  }

  const filtered = stints.filter(s => s.duration >= minDur && (!zoneFilter || s.zone === zoneFilter));
  const cmpDir   = sortDir === 'asc' ? 1 : -1;
  const sorted   = [...filtered].sort((a,b) => {
    const v = a[sortCol] < b[sortCol] ? -1 : a[sortCol] > b[sortCol] ? 1 : 0;
    return v * cmpDir;
  });
  const pageData  = sorted.slice(page * PAGE, (page+1) * PAGE);
  const totalPages = Math.ceil(sorted.length / PAGE);

  // zone summary
  const zoneCounts = {O:0,N:0,D:0};
  stints.forEach(s => { if (zoneCounts[s.zone] != null) zoneCounts[s.zone]++; });
  const total = stints.length;

  const Th = ({col, label, right}) => {
    const active = sortCol === col;
    return (
      <th onClick={() => toggleSort(col)} style={{cursor:'pointer',textAlign:right?'right':'left',
        color:active?'#1d4ed8':'#666', userSelect:'none'}}>
        {label}{active ? (sortDir==='asc' ? ' ↑' : ' ↓') : ''}
      </th>
    );
  };

  return (
    <div>
      <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
        <div style={{fontSize:13,color:'#666',fontWeight:500}}>{sorted.length.toLocaleString()} shifts</div>
        <div style={{display:'flex',gap:4}}>
          {[0,10,20,30].map(d => (
            <button key={d} onClick={() => { setMinDur(d); setPage(0); }} style={{
              padding:'3px 9px', fontSize:11, fontWeight:600, borderRadius:4, border:'1px solid',
              borderColor: minDur===d ? '#374151' : '#ddd',
              background: minDur===d ? '#f3f4f6' : '#fff',
              color: minDur===d ? '#111' : '#888', cursor:'pointer',
            }}>{d===0?'All':`≥${d}s`}</button>
          ))}
        </div>
        <div style={{width:1,height:16,background:'#e5e5e5'}}/>
        <div style={{display:'flex',gap:6}}>
          {['','O','N','D'].map(z => (
            <button key={z} onClick={() => { setZoneFilter(z); setPage(0); }} style={{
              padding:'3px 10px', fontSize:11, fontWeight:600, borderRadius:4, border:'1px solid',
              borderColor: zoneFilter===z ? '#1d4ed8' : '#ddd',
              background: zoneFilter===z ? '#eff6ff' : '#fff',
              color: zoneFilter===z ? '#1d4ed8' : '#555', cursor:'pointer',
            }}>{z===''?'All zones':ZONE_LABELS[z]}</button>
          ))}
        </div>
        {total > 0 && (
          <div style={{marginLeft:'auto',fontSize:11,color:'#aaa',display:'flex',gap:12}}>
            {Object.entries(zoneCounts).map(([z,n]) => (
              <span key={z} style={{background:ZONE_COLORS[z],color:ZONE_TEXT[z],borderRadius:3,padding:'1px 7px',fontWeight:600}}>
                {ZONE_LABELS[z]} {Math.round(n/total*100)}%
              </span>
            ))}
          </div>
        )}
      </div>

      <div style={{border:'1px solid #e8e8e8',borderRadius:6,overflow:'hidden'}}>
        <table style={{fontSize:12}}>
          <thead><tr style={{background:'#fafafa'}}>
            <Th col="game_id" label="Game"/>
            <Th col="period" label="Per" right/>
            <th style={{textAlign:'right',color:'#666'}}>Time</th>
            <Th col="duration" label="Length" right/>
            <Th col="zone" label="Zone"/>
            <Th col="score" label="Score" right/>
            <Th col="xgd" label="xGD" right/>
            <th style={{textAlign:'right',color:'#ccc',fontSize:10,fontWeight:400}}>segs</th>
          </tr></thead>
          <tbody>
            {pageData.map((s,i) => {
              const isExp = expanded === `${s.game_id}-${s.period}-${s.start_sec}`;
              const xgdColor = s.xgd > 0.005 ? '#166534' : s.xgd < -0.005 ? '#991b1b' : '#555';
              return (
                <tr key={i} onClick={() => setExpanded(isExp ? null : `${s.game_id}-${s.period}-${s.start_sec}`)}
                  style={{cursor:'pointer', background: isExp ? '#f0f4ff' : 'transparent',
                    borderTop:'1px solid #f5f5f5'}}>
                  <td style={{fontFamily:'IBM Plex Mono',color:'#888',fontSize:11}}>{s.game_id}</td>
                  <td style={{textAlign:'right',fontFamily:'IBM Plex Mono'}}>{fmtPeriod(s.period)}</td>
                  <td style={{textAlign:'right',fontFamily:'IBM Plex Mono',color:'#aaa'}}>{fmtTime(s.start_sec)}</td>
                  <td style={{textAlign:'right',fontFamily:'IBM Plex Mono',fontWeight:600}}>{s.duration}s</td>
                  <td>
                    <span style={{background:ZONE_COLORS[s.zone]||'#f3f4f6',color:ZONE_TEXT[s.zone]||'#555',
                      borderRadius:3,padding:'1px 6px',fontWeight:600,fontSize:10}}>
                      {ZONE_LABELS[s.zone]||s.zone}
                    </span>
                  </td>
                  <td style={{textAlign:'right'}}>{fmtScore(s.score)}</td>
                  <td style={{textAlign:'right',fontFamily:'IBM Plex Mono',fontWeight:600,color:xgdColor}}>
                    {s.xgd >= 0 ? '+' : ''}{s.xgd.toFixed(4)}
                  </td>
                  <td style={{textAlign:'right',fontFamily:'IBM Plex Mono',fontSize:11,color:'#ccc'}}>{s.n_segs||1}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {totalPages > 1 && (
        <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:12,alignItems:'center'}}>
          <button onClick={() => setPage(p => Math.max(0,p-1))} disabled={page===0}
            style={{padding:'4px 12px',borderRadius:4,border:'1px solid #ddd',cursor:'pointer',fontSize:12,background:'#fff'}}>
            ‹ Prev
          </button>
          <span style={{fontSize:12,color:'#888'}}>Page {page+1} of {totalPages} ({sorted.length.toLocaleString()} stints)</span>
          <button onClick={() => setPage(p => Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}
            style={{padding:'4px 12px',borderRadius:4,border:'1px solid #ddd',cursor:'pointer',fontSize:12,background:'#fff'}}>
            Next ›
          </button>
        </div>
      )}
    </div>
  );
};

// ── PLAYER PROFILE ────────────────────────────────────────────────────────────
const PlayerProfile = ({player, setPage}) => {

  const season = window.__DATA__.current_season;

  React.useEffect(() => {
    if (!player) return;
    setEmpData(null);
    fetch(`/player/${player.id}/decay?season=${season}`)
      .then(r => r.json())
      .then(d => setEmpData(d))
      .catch(() => setEmpData({buckets:[], values:[], se:[]}));

  if (!player) return <div style={{padding:40,color:'#888'}}>No player selected.</div>;

  const rapmMaxAge = (empData && empData.max_age) ? empData.max_age : 80;

  for (let t = 0; t <= rapmMaxAge; t += 5) rapmAges.push(t);
  const rapmObs  = rapmAges.map(t => +(player.base_rapm*42 + player.decay_coef*t*42).toFixed(3));

  return (

          </div>
          <div style={{fontSize:13,color:'#888',display:'flex',gap:10,alignItems:'center'}}>
            <Tag bg="#f0f4ff" color="#1d4ed8">{player.team}</Tag>
            <span>{player.pos}</span><span>·</span><span>5v5</span>
            {player.flagged && <Tag bg="#fee2e2" color="#dc2626">⚠ Overuse Flagged</Tag>}
          </div>
        </div>
      </div>

      {/* Top row: chart + shift breakdown */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 210px',gap:16,marginBottom:16}}>
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
          <SectionHeader title="On-Ice xGD/60 by Shift Age"
            sub="20s rolling window, 5s step (≥20s stints only, ≥60s TOI per window). Grey band = league P25–P75. Dashed = RAPM model."/>
          {empData === null
            ? <div style={{height:240,display:'flex',alignItems:'center',justifyContent:'center',color:'#bbb',fontSize:13}}>Loading…</div>
            : empData.buckets.length < 4
              ? <div style={{height:240,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#999',fontSize:13,gap:6,textAlign:'center'}}>
                  <div style={{fontSize:14,fontWeight:600,color:'#777'}}>Not enough data for a reliable curve</div>
                  <div style={{fontSize:12,color:'#aaa'}}>{player.toi_min} min 5v5 TOI · insufficient shift-age coverage</div>
                </div>
              : <DecayCurveChart buckets={empData.buckets} values={empData.values} rapmObs={rapmObs} rapmAges={rapmAges}
                  leagueP25={LEAGUE_P25} leagueP75={LEAGUE_P75} leagueMed={LEAGUE_MED} width={680} height={240}/>
          }
        </div>
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
          <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:'#888',marginBottom:14}}>Shift Breakdown</div>
          {[
            ['Fresh (0–30s)', fmt(player.early), player.pct_early],
            ['Mid (30–45s)',  fmt(+(player.obs[3]+player.obs[4]).toFixed(2)/2), null],
            ['Late (45s+)',   fmt(player.late),  player.pct_late],
            ['Durability',    fmt(player.drop),  player.pct_drop],

              <div key={l}>

            <PctBadge pct={player.pct_late}  label="Late xGD/60"/>

            {[['Base RAPM',fmt(player.base_rapm,4)],['Decay coef',player.decay_coef.toFixed(6)],['Break-even',fmtBreak(player.breakeven)]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,color:'#aaa',marginBottom:2}}>{l}</div>
                <div style={{fontSize:17,fontWeight:700,fontFamily:'IBM Plex Mono'}}>{v}</div></div>
            ))}
          </div>
          <div style={{fontSize:10,color:'#bbb',marginTop:8,fontStyle:'italic'}}>Ridge regression — coefficients near zero = needs more data (300+ games).</div>
        </div>
      </div>


      {/* Stint list */}
      <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
        <SectionHeader title="Individual Shifts" sub="Each row = one player shift. Clock-adjacent sub-stints (same player on ice across a line change) are merged into one. 'Segs' = how many sub-stints were merged. Stoppages (face-offs, icings) always break a shift."/>
        <StintsTable player={player} season={season}/>
      </div>
    </div>
  );
};

// ── LINES PAGE ────────────────────────────────────────────────────────────────
const LinesPage = () => {

  const [teamFilter, setTeamFilter] = useState('All');
  const filtered = (teamFilter==='All'?LINES:LINES.filter(l=>l.team===teamFilter));
  const topLines = [...filtered].sort((a,b)=>b.xgd60-a.xgd60);
  const overuse  = [...filtered].filter(l=>l.flagged).sort((a,b)=>a.decay-b.decay);
  const rows = tab==='top'?topLines:overuse;

  const xgdPcts = LINES.map(l=>l.xgd60).sort((a,b)=>a-b);
  const getXgdPct = v => Math.round(xgdPcts.indexOf(xgdPcts.find(x=>x>=v))/(xgdPcts.length-1)*100);
  const decayPcts = LINES.map(l=>l.decay).sort((a,b)=>a-b);
  const getDecPct = v => Math.round(100-decayPcts.indexOf(decayPcts.find(x=>x>=v))/(decayPcts.length-1)*100);

  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:'32px 24px'}}>

        <select value={teamFilter} onChange={e=>setTeamFilter(e.target.value)}>

      <div style={{display:'flex',gap:2,marginBottom:20,borderBottom:'2px solid #e5e5e5'}}>

          <button key={k} onClick={()=>setTab(k)} style={{padding:'10px 18px',fontSize:13,fontWeight:600,

          </button>

      {tab==='overuse' && (

          {overuse.length} line combinations flagged — early-to-late drop exceeds 1.0 xGD/60

            <th>Team</th><th>TOI (min)</th><th>xGD/60</th><th>xGF%</th><th>CF%</th><th>Avg Shift (s)</th>
            {tab==='overuse'&&<><th>Early xGD</th><th>Late xGD</th><th>Decay</th></>}
            <th>Stints</th>
          </tr></thead>
          <tbody>{rows.map((l,i)=>(
            <tr key={i} style={{background:l.flagged&&tab==='top'?'#fff8f8':''}}>
              <td style={{paddingLeft:16,maxWidth:320}}>
                <div style={{fontSize:12,color:'#333',lineHeight:1.4,textWrap:'pretty'}}>{l.players}</div>
              </td>
              <td style={{textAlign:'center'}}><Tag>{l.team}</Tag></td>
              <td style={{fontFamily:'IBM Plex Mono',fontSize:12}}>{l.toi_min}</td>
              <PctCell pct={getXgdPct(l.xgd60)} value={fmt(l.xgd60)} bold/>
              <PctCell pct={Math.round((l.xgf-40)/20*100)} value={fmtNoSign(l.xgf,1)}/>
              <PctCell pct={Math.round((l.cf-40)/20*100)} value={fmtNoSign(l.cf,1)}/>
              <td style={{fontFamily:'IBM Plex Mono',fontSize:12}}>{l.avg_shift}</td>
              {tab==='overuse'&&<>
                <PctCell pct={getXgdPct(l.early_xgd)} value={fmt(l.early_xgd,1)}/>
                <PctCell pct={getXgdPct(l.late_xgd)} value={fmt(l.late_xgd,1)}/>
                <PctCell pct={getDecPct(l.decay)} value={fmt(l.decay,1)} bold/>
              </>}
              <td style={{fontFamily:'IBM Plex Mono',fontSize:12}}>{l.stints}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
};

// ── TEAM REPORT ───────────────────────────────────────────────────────────────
const TeamReportPage = ({setPage, setSelectedPlayer}) => {
  const [team, setTeam] = useState(TEAMS[0]||'');
  const [tip, setTip] = useState(null);
  const roster = PLAYERS.filter(p=>p.team===team).sort((a,b)=>b.toi_min-a.toi_min);
  const flags = roster.filter(p=>p.flagged).length;
  const avgD  = roster.length ? (roster.reduce((s,p)=>s+p.decay_coef,0)/roster.length).toFixed(6) : 'N/A';
  const breaks = roster.filter(p=>p.breakeven!=null).map(p=>p.breakeven).sort((a,b)=>a-b);
  const medB  = breaks.length ? fmtBreak(breaks[Math.floor(breaks.length/2)]) : 'N/A';
  const openPlayer = p => { setSelectedPlayer(p); setPage('profile'); };

  // ── Quality vs. Durability scatter ──────────────────────────────────────────
  const scW=480, scH=280;
  const sm={top:20,right:20,bottom:48,left:56};
  const sW=scW-sm.left-sm.right, sH=scH-sm.top-sm.bottom;
  const xs=roster.map(p=>p.decay_coef), ys=roster.map(p=>p.base_rapm);
  const xPad=0.00005, yPad=0.005;
  const xMin=(xs.length?Math.min(...xs):-.001)-xPad, xMax=(xs.length?Math.max(...xs):.001)+xPad;
  const yMin=(ys.length?Math.min(...ys):-.1)-yPad,   yMax=(ys.length?Math.max(...ys):.1)+yPad;
  const sxS=v=>((v-xMin)/(xMax-xMin))*sW;
  const syS=v=>sH-((v-yMin)/(yMax-yMin))*sH;
  // quadrant labels
  const quadrants = [
    {x:sW*0.75,y:10,  label:'Elite and Durable',color:'#15803d'},
    {x:sW*0.05,y:10,  label:'Elite but Fades',  color:'#b45309'},
    {x:sW*0.75,y:sH-6,label:'Safe but Low Output', color:'#6b7280'},
    {x:sW*0.05,y:sH-6,label:'Avoid',             color:'#dc2626'},
  ];

  const handleScatterMove = (e, p) => {
    const rect = e.currentTarget.closest('svg').getBoundingClientRect();
    setTip({p, x: e.clientX - rect.left, y: e.clientY - rect.top});
  };

  // ── Deployment guide groups ──────────────────────────────────────────────────
  const deployGroups = [
    {
      label: 'Elite and Durable', color: '#15803d', bg: '#f0fdf4',
      advice: 'Long shifts OK. Play in all situations.',
      players: roster.filter(p => p.base_rapm > 0 && p.decay_coef >= 0),
    },
    {
      label: 'Elite but Fades', color: '#b45309', bg: '#fffbeb',
      advice: 'Keep shifts short. Swap out before 40s.',
      players: roster.filter(p => p.base_rapm > 0 && p.decay_coef < 0),
    },
    {
      label: 'Safe but Low Output', color: '#6b7280', bg: '#f9fafb',
      advice: 'Depth minutes. Shift length flexible.',
      players: roster.filter(p => p.base_rapm <= 0 && p.decay_coef >= 0),
    },
    {
      label: 'Avoid', color: '#dc2626', bg: '#fff5f5',
      advice: 'Minimize deployment. Negative from puck drop.',
      players: roster.filter(p => p.base_rapm <= 0 && p.decay_coef < 0),
    },
  ].filter(g => g.players.length > 0);

  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:'32px 24px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <TeamLogo code={team} size={52}/>
          <div>
            <h1 style={{fontSize:26,fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>Team Deployment Report</h1>
            <p style={{fontSize:13,color:'#888'}}>Quality and durability profiles for each skater · 5v5</p>
          </div>
        </div>
        <select value={team} onChange={e=>setTeam(e.target.value)} style={{minWidth:120}}>
          {TEAMS.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </div>

      {/* KPI row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
        <KPICard label="Players in sample" value={roster.length} accent="#1d4ed8"/>
        <KPICard label="Overuse-risk skaters" value={flags} sub="Bottom 15% decay among high-TOI players" accent={flags>0?'#dc2626':'#16a34a'}/>
        <KPICard label="Team avg decay" value={avgD} accent="#8b5cf6"/>
        <KPICard label="Median break-even" value={medB} accent="#0891b2"/>
      </div>

      {/* Main two-column section */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}}>

        {/* Quality vs Durability scatter */}
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px',position:'relative'}}>
          <SectionHeader title="Quality vs. Durability" sub="Each dot = one player. Hover to identify, click to open profile."/>
          <div style={{fontSize:11,color:'#888',marginBottom:10,display:'flex',gap:16}}>
            <span><b style={{color:'#1d4ed8'}}>X →</b> Decay coef (right = holds up longer)</span>
            <span><b style={{color:'#1d4ed8'}}>Y ↑</b> Base RAPM (up = better quality)</span>
          </div>
          <div style={{position:'relative',display:'inline-block'}}>
            <svg width={scW} height={scH} style={{cursor:'crosshair'}} onMouseLeave={()=>setTip(null)}>
              <g transform={`translate(${sm.left},${sm.top})`}>
                {/* quadrant shading */}
                <rect x={sxS(0)} y={0} width={sW-sxS(0)} height={syS(0)} fill="#f0fdf4" opacity="0.6"/>
                <rect x={0} y={0} width={sxS(0)} height={syS(0)} fill="#fffbeb" opacity="0.5"/>
                <rect x={sxS(0)} y={syS(0)} width={sW-sxS(0)} height={sH-syS(0)} fill="#f9fafb" opacity="0.4"/>
                <rect x={0} y={syS(0)} width={sxS(0)} height={sH-syS(0)} fill="#fff5f5" opacity="0.5"/>
                {/* zero lines */}
                <line x1={0} y1={syS(0)} x2={sW} y2={syS(0)} stroke="#ddd" strokeWidth="1"/>
                <line x1={sxS(0)} y1={0} x2={sxS(0)} y2={sH} stroke="#ddd" strokeWidth="1"/>
                {/* quadrant labels */}
                {quadrants.map(q=>(
                  <text key={q.label} x={q.x} y={q.y} fontSize="9" fill={q.color} opacity="0.7"
                    fontFamily="IBM Plex Sans, sans-serif" fontWeight="600" textAnchor={q.x>sW/2?'end':'start'}>{q.label}</text>
                ))}
                {/* dots */}
                {roster.map(p=>(
                  <circle key={p.id}
                    cx={sxS(p.decay_coef)} cy={syS(p.base_rapm)} r={Math.max(4, Math.min(8, p.toi_min/15))}
                    fill={p.flagged?'#dc2626':'#1d4ed8'} opacity="0.75" stroke="#fff" strokeWidth="1.2"
                    style={{cursor:'pointer'}}
                    onClick={()=>openPlayer(p)}
                    onMouseEnter={e=>handleScatterMove(e,p)}
                    onMouseMove={e=>handleScatterMove(e,p)}
                    onMouseLeave={()=>setTip(null)}/>
                ))}
                {/* axes */}
                {[xMin+(xMax-xMin)*0.25, xMin+(xMax-xMin)*0.5, xMin+(xMax-xMin)*0.75].map((v,i)=>(
                  <text key={i} x={sxS(v)} y={sH+18} textAnchor="middle" fontSize="9" fill="#bbb" fontFamily="IBM Plex Mono">{v.toFixed(4)}</text>
                ))}
                <text x={sW/2} y={sH+36} textAnchor="middle" fontSize="11" fill="#888">Decay coefficient</text>
                <text x={-42} y={sH/2} textAnchor="middle" fontSize="11" fill="#888" transform={`rotate(-90,-42,${sH/2})`}>Base RAPM</text>
                {[yMin+(yMax-yMin)*0.25,yMin+(yMax-yMin)*0.5,yMin+(yMax-yMin)*0.75].map((v,i)=>(
                  <text key={i} x={-6} y={syS(v)+4} textAnchor="end" fontSize="9" fill="#bbb" fontFamily="IBM Plex Mono">{v.toFixed(3)}</text>
                ))}
              </g>
            </svg>
            {tip && (
              <div style={{position:'absolute',left:tip.x+12,top:tip.y-10,background:'#1a1a2e',color:'#fff',
                borderRadius:6,padding:'8px 11px',fontSize:12,pointerEvents:'none',whiteSpace:'nowrap',
                boxShadow:'0 4px 16px rgba(0,0,0,0.25)',zIndex:999}}>
                <div style={{fontWeight:600,marginBottom:2}}>{tip.p.name} <span style={{opacity:0.5,fontWeight:400}}>({tip.p.pos})</span></div>
                <div style={{fontFamily:'IBM Plex Mono',fontSize:11,color:'#a5b4fc'}}>RAPM <span style={{color:'#fff'}}>{tip.p.base_rapm.toFixed(4)}</span>  Decay <span style={{color:'#fff'}}>{tip.p.decay_coef.toFixed(6)}</span></div>
                <div style={{fontSize:10,color:'#94a3b8',marginTop:2}}>TOI {tip.p.toi_min} min · Click to open profile</div>
              </div>
            )}
          </div>
          <div style={{fontSize:10,color:'#bbb',marginTop:6}}>Dot size ∝ 5v5 TOI. <span style={{color:'#dc2626'}}>Red</span> = overuse-flagged.</div>
        </div>

        {/* Deployment guide */}
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
          <SectionHeader title="Deployment Guide" sub="Players grouped by shift-decay quadrant. Click any name to open profile."/>
          <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:12,maxHeight:320,overflowY:'auto'}}>
            {deployGroups.map(g=>(
              <div key={g.label} style={{background:g.bg,borderRadius:6,padding:'10px 12px',border:`1px solid ${g.color}22`}}>
                <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:4}}>
                  <span style={{fontSize:11,fontWeight:700,color:g.color,textTransform:'uppercase',letterSpacing:'0.06em'}}>{g.label}</span>
                  <span style={{fontSize:11,color:'#888'}}>{g.advice}</span>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:'4px 10px'}}>
                  {g.players.sort((a,b)=>b.base_rapm-a.base_rapm).map(p=>(
                    <button key={p.id} onClick={()=>openPlayer(p)}
                      style={{fontSize:12,fontWeight:600,color:'#1d4ed8',background:'none',border:'none',padding:0,cursor:'pointer'}}>
                      {p.name}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Roster table */}
      <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
        <SectionHeader title="Roster Breakdown" sub="Click a player name to open their full profile."/>
        <table>
          <thead><tr>
            <th style={{textAlign:'left'}}>Player</th><th>Pos</th><th>Base RAPM</th><th>Decay</th><th>Early xGD</th><th>Late xGD</th><th>TOI (min)</th><th>Break-even</th><th>Flagged</th>
          </tr></thead>
          <tbody>{roster.map(p=>(
            <tr key={p.id}>
              <td><button onClick={()=>openPlayer(p)} style={{color:'#1d4ed8',fontWeight:600,fontSize:13}}>{p.name}</button></td>
              <td style={{textAlign:'center',color:'#888',fontSize:12}}>{p.pos}</td>
              <PctCell pct={p.pct_rapm}  value={fmt(p.base_rapm,4)}/>
              <PctCell pct={p.pct_decay} value={p.decay_coef.toFixed(6)}/>
              <PctCell pct={p.pct_early} value={fmt(p.early)}/>
              <PctCell pct={p.pct_late}  value={fmt(p.late)}/>
              <td style={{fontFamily:'IBM Plex Mono',fontSize:12}}>{p.toi_min}</td>
              <td style={{fontFamily:'IBM Plex Mono',fontSize:12}}>{fmtBreak(p.breakeven)}</td>
              <td style={{textAlign:'center'}}>{p.flagged?<Tag bg="#fee2e2" color="#dc2626">⚠ Yes</Tag>:<span style={{color:'#aaa',fontSize:12}}>—</span>}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
};

// ── APP ────────────────────────────────────────────────────────────────────────
const App = () => {
  const urlParams = new URLSearchParams(window.location.search);
  const urlSeason = urlParams.get('season') || window.__DATA__.current_season;

  const [page, setPage] = useState(() => localStorage.getItem('hk_page')||'overview');
  const [selectedPlayer, setSelectedPlayer] = useState(null);

  useEffect(()=>{ localStorage.setItem('hk_page', page); }, [page]);

  const onSeasonChange = (s) => {
    window.location.href = '/?season=' + s;
  };

  const goPage = (p) => setPage(p);

  const breadcrumbs = {
    overview: [{label:'League Overview'}],
    players:  [{label:'League Overview', onClick:()=>goPage('overview')},{label:'Players'}],
    profile:  [{label:'League Overview',onClick:()=>goPage('overview')},{label:'Players',onClick:()=>goPage('players')},{label:selectedPlayer?.name||'Profile'}],
    lines:    [{label:'League Overview',onClick:()=>goPage('overview')},{label:'Lines'}],
    team:     [{label:'League Overview',onClick:()=>goPage('overview')},{label:'Team Report'}],
  };

  return (
    <div style={{minHeight:'100vh',background:'#f8f8f7'}}>
      <TopNav page={page==='profile'?'players':page} setPage={goPage} season={urlSeason} onSeasonChange={onSeasonChange} breadcrumb={breadcrumbs[page]}/>
      {page==='overview' && <OverviewPage setPage={goPage} setSelectedPlayer={setSelectedPlayer}/>}
      {page==='players'  && <PlayersPage setPage={goPage} setSelectedPlayer={setSelectedPlayer}/>}
      {page==='profile'  && <PlayerProfile player={selectedPlayer} setPage={goPage}/>}
      {page==='lines'    && <LinesPage/>}
      {page==='team'     && <TeamReportPage setPage={goPage} setSelectedPlayer={setSelectedPlayer}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
