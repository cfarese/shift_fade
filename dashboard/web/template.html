<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift Fade</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; background: #f8f8f7; color: #111; font-size: 15px; zoom: 1.06; }
.mono { font-family: 'IBM Plex Mono', monospace; }
select { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; padding: 6px 10px; background: #fff; cursor: pointer; outline: none; }
select:focus { border-color: #1d4ed8; }
button { font-family: 'IBM Plex Sans', sans-serif; cursor: pointer; border: none; background: none; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #f1f1f1; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
table { border-collapse: collapse; width: 100%; }
th { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #666; padding: 8px 10px; border-bottom: 2px solid #e5e5e5; text-align: right; white-space: nowrap; }
th:first-child { text-align: left; }
td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; font-size: 14px; text-align: right; vertical-align: middle; }
td:first-child { text-align: left; }
tr:hover td { background: #fafaf9; }
</style>
<!-- Real data injected by server -->
<script>window.__DATA__ = {{DATA_JSON}};</script>
</head>
<body>
<div id="root"></div>
<script src="/app.bundle.js"></script>
</body>
</html>
