<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

// ── REAL DATA ────────────────────────────────────────────────────────────────
const AGES = [0,10,20,30,40,50,60,70,80];
const PLAYERS    = window.__DATA__.players;
const LINES      = window.__DATA__.lines;
const LEAGUE_P25 = window.__DATA__.league_p25;
const LEAGUE_P75 = window.__DATA__.league_p75;
const LEAGUE_MED = window.__DATA__.league_med;
const TEAMS      = [...new Set(PLAYERS.map(p=>p.team))].sort();
const SEASONS    = window.__DATA__.seasons;

// ── UTILS ────────────────────────────────────────────────────────────────────
function rankField(arr, field, hi=true) {
  const vals = arr.map(p=>p[field]).sort((a,b)=>a-b);
  return arr.map(p => {
    const idx = vals.indexOf(p[field]);
    const pct = idx/(vals.length-1)*100;
    return hi ? pct : 100-pct;
  });
}

// ── OLS regression ───────────────────────────────────────────────────────────
function ols(xs, ys) {
  const n = xs.length;
  if (n < 2) return {slope:0, intercept:0, r2:0, r:0};
  const mX = xs.reduce((a,b)=>a+b,0)/n;
  const mY = ys.reduce((a,b)=>a+b,0)/n;
  const ssXX = xs.reduce((s,x)=>s+(x-mX)**2, 0);
  const ssXY = xs.reduce((s,x,i)=>s+(x-mX)*(ys[i]-mY), 0);
  const ssYY = ys.reduce((s,y)=>s+(y-mY)**2, 0);
  const slope = ssXX > 0 ? ssXY/ssXX : 0;
  const intercept = mY - slope*mX;
  const r2 = (ssXX > 0 && ssYY > 0) ? ssXY**2/(ssXX*ssYY) : 0;
  const r  = (ssXX > 0 && ssYY > 0) ? ssXY/Math.sqrt(ssXX*ssYY) : 0;
  return {slope, intercept, r2, r};
}

const lerp = (a,b,t) => a+(b-a)*t;
function pctBg(pct) {
  const t = clamp(pct,0,100)/100;
  if (t<0.5) { const s=t*2; return `rgb(${Math.round(lerp(214,255,s))},${Math.round(lerp(40,255,s))},${Math.round(lerp(40,255,s))})`; }
  const s=(t-0.5)*2;
  return `rgb(${Math.round(lerp(255,29,s))},${Math.round(lerp(255,100,s))},${Math.round(lerp(255,220,s))})`;
}
function pctFg(pct) { return (pct<18||pct>82)?'#fff':'#222'; }
const fmt = (v,d=2) => v==null?'—':(v>0?'+':'')+Number(v).toFixed(d);
const fmtNoSign = (v,d=2) => v==null?'—':Number(v).toFixed(d);
const fmtBreak = (v) => v==null?'Never':v>200?'>200s':v+'s';
const overuseCount = PLAYERS.filter(p=>p.flagged).length;
const avgDecay = (PLAYERS.reduce((s,p)=>s+p.decay_coef,0)/PLAYERS.length);
const medBreak = PLAYERS.filter(p=>p.breakeven!=null).map(p=>p.breakeven).sort((a,b)=>a-b);

// ── SHARED COMPONENTS ────────────────────────────────────────────────────────
const KPICard = ({label, value, sub, accent}) => (
  <div style={{padding:'20px 24px', background:'#fff', border:'1px solid #e8e8e8', borderRadius:6, borderTop: accent?`3px solid ${accent}`:'3px solid transparent'}}>
    <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em',color:'#888',marginBottom:8}}>{label}</div>
    <div style={{fontSize:28,fontWeight:700,letterSpacing:'-0.02em',fontFamily:'IBM Plex Mono'}}>{value}</div>
    {sub && <div style={{fontSize:11,color:'#999',marginTop:4}}>{sub}</div>}
  </div>
);

const PctCell = ({pct, value, bold}) => (
  <td style={{background:pctBg(pct), color:pctFg(pct), fontFamily:'IBM Plex Mono', fontSize:12, fontWeight:bold?600:400}}>
    {value}
  </td>
);

const PctBadge = ({pct, label}) => (
  <div style={{textAlign:'center'}}>
    <div style={{display:'inline-block', background:pctBg(pct), color:pctFg(pct), borderRadius:4, padding:'4px 10px', fontFamily:'IBM Plex Mono', fontSize:13, fontWeight:600, minWidth:52}}>{pct}<span style={{fontSize:10,fontWeight:400}}>th</span></div>
    <div style={{fontSize:11,color:'#888',marginTop:4,fontWeight:500}}>{label}</div>
  </div>
);

const Tag = ({children, color='#666', bg='#f0f0f0'}) => (
  <span style={{fontSize:11,fontWeight:600,padding:'2px 7px',background:bg,color,borderRadius:3,letterSpacing:'0.04em'}}>{children}</span>
);

const SectionHeader = ({title, sub}) => (
  <div style={{marginBottom:16}}>
    <div style={{fontSize:16,fontWeight:700,letterSpacing:'-0.01em'}}>{title}</div>
    {sub && <div style={{fontSize:12,color:'#888',marginTop:3,fontStyle:'italic'}}>{sub}</div>}
  </div>
);

// ── NAV ──────────────────────────────────────────────────────────────────────
const NAV_PAGES = ['overview','players','lines','team'];
const NAV_LABELS = {overview:'Overview',players:'Players',lines:'Lines',team:'Team Report'};

function seasonLabel(s) {
  // "20232024" -> "2023-24"
  if (s && s.length === 8) return s.slice(0,4) + '–' + s.slice(6);
  return s;
}

const TopNav = ({page,setPage,season,onSeasonChange,breadcrumb}) => (
  <div style={{background:'#fff',borderBottom:'1px solid #e5e5e5',position:'sticky',top:0,zIndex:100}}>
    <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',gap:0,height:52}}>
      <div style={{fontWeight:700,fontSize:14,letterSpacing:'-0.01em',marginRight:32,color:'#111',whiteSpace:'nowrap'}}>
        <span style={{color:'#1d4ed8'}}>⬡</span> Shift Decay RAPM
      </div>
      {NAV_PAGES.map(p=>(
        <button key={p} onClick={()=>setPage(p)} style={{
          padding:'0 16px',height:52,fontSize:13,fontWeight:600,
          color:page===p?'#1d4ed8':'#555',
          borderBottom:page===p?'2px solid #1d4ed8':'2px solid transparent',
          transition:'all .15s',letterSpacing:'0.01em'
        }}>{NAV_LABELS[p]}</button>
      ))}
      <div style={{flex:1}}/>
      <select value={season} onChange={e=>onSeasonChange(e.target.value)} style={{fontSize:12}}>
        {SEASONS.map(s=><option key={s} value={s}>{seasonLabel(s)}</option>)}
      </select>
    </div>
    {breadcrumb && (
      <div style={{maxWidth:1200,margin:'0 auto',padding:'6px 24px',background:'#fafaf9',borderTop:'1px solid #f0f0f0',fontSize:12,color:'#888',display:'flex',alignItems:'center',gap:6}}>
        {breadcrumb.map((b,i)=>(
          <React.Fragment key={i}>
            {i>0&&<span style={{color:'#ccc'}}>/</span>}
            {b.onClick
              ? <button onClick={b.onClick} style={{color:'#1d4ed8',fontWeight:500,fontSize:12}}>{b.label}</button>
              : <span style={{color:i===breadcrumb.length-1?'#333':'#888',fontWeight:i===breadcrumb.length-1?600:400}}>{b.label}</span>}
          </React.Fragment>
        ))}
      </div>
    )}
  </div>
);

// ── DECAY CURVE CHART ─────────────────────────────────────────────────────────
const DecayCurveChart = ({player, width=600, height=240}) => {
  const m = {top:18,right:24,bottom:44,left:52};
  const W = width-m.left-m.right, H = height-m.top-m.bottom;
  const allV = [...LEAGUE_P25,...LEAGUE_P75,...(player?player.obs:[])];
  const yMin = Math.floor(Math.min(...allV)-0.5), yMax = Math.ceil(Math.max(...allV)+0.5);
  const xS = t => (t/80)*W;
  const yS = v => H - ((v-yMin)/(yMax-yMin))*H;
  const pathOf = pts => pts.map((v,i)=>`${i?'L':'M'} ${xS(AGES[i])} ${yS(v)}`).join(' ');
  const bandPath = [
    ...LEAGUE_P75.map((v,i)=>`${i?'L':'M'} ${xS(AGES[i])} ${yS(v)}`),
    ...LEAGUE_P25.slice().reverse().map((v,i)=>`L ${xS(AGES[AGES.length-1-i])} ${yS(v)}`),
    'Z'
  ].join(' ');
  const yTicks = [];
  for(let v=Math.ceil(yMin); v<=yMax; v+=2) yTicks.push(v);
  const avgShift = 45;
  return (
    <svg width={width} height={height} style={{display:'block',overflow:'visible'}}>
      <g transform={`translate(${m.left},${m.top})`}>
        <path d={bandPath} fill="#e2eaf6" opacity="0.7"/>
        <path d={pathOf(LEAGUE_MED)} stroke="#aab" strokeWidth="1.5" strokeDasharray="5 3" fill="none"/>
        <line x1={xS(avgShift)} y1={0} x2={xS(avgShift)} y2={H} stroke="#bbb" strokeDasharray="3 2" strokeWidth="1"/>
        <text x={xS(avgShift)+4} y={12} fontSize="10" fill="#aaa" fontFamily="IBM Plex Mono">avg shift</text>
        <line x1={0} y1={yS(0)} x2={W} y2={yS(0)} stroke="#ddd" strokeWidth="1"/>
        {yTicks.map(v=>(
          <g key={v}>
            <line x1={0} y1={yS(v)} x2={W} y2={yS(v)} stroke="#f0f0f0" strokeWidth="1"/>
            <text x={-8} y={yS(v)+4} textAnchor="end" fontSize="11" fill="#999" fontFamily="IBM Plex Mono">{v}</text>
          </g>
        ))}
        {AGES.map((t,i)=>(
          <text key={i} x={xS(t)} y={H+20} textAnchor="middle" fontSize="11" fill="#999" fontFamily="IBM Plex Mono">{t}</text>
        ))}
        <text x={W/2} y={H+38} textAnchor="middle" fontSize="12" fill="#777">Shift age (seconds)</text>
        <text x={-36} y={H/2} textAnchor="middle" fontSize="12" fill="#777" transform={`rotate(-90,-36,${H/2})`}>xGD/60</text>
        {player && <>
          <path d={pathOf(player.obs)} stroke="#1d4ed8" strokeWidth="2.5" fill="none" strokeLinejoin="round"/>
          {AGES.map((t,i)=>(
            <circle key={i} cx={xS(t)} cy={yS(player.obs[i])} r="4" fill="#1d4ed8" stroke="#fff" strokeWidth="1.5"/>
          ))}
        </>}
        {/* Legend */}
        <g transform={`translate(${W-160},${H+26})`}>
          <rect x="0" y="-6" width="12" height="12" fill="#e2eaf6" rx="2"/>
          <text x="16" y="4" fontSize="10" fill="#888">P25–P75 league</text>
          <line x1="90" y1="0" x2="102" y2="0" stroke="#aab" strokeWidth="1.5" strokeDasharray="4 2"/>
          <text x="106" y="4" fontSize="10" fill="#888">median</text>
        </g>
      </g>
    </svg>
  );
};

// ── HISTOGRAM (decay coef distribution) ──────────────────────────────────────
const Histogram = ({players, width=360, height=190}) => {
  const m = {top:12,right:12,bottom:50,left:48};
  const W = width-m.left-m.right, H = height-m.top-m.bottom;
  const vals = players.map(p=>p.decay_coef);
  const min=-0.0008, max=0.0005, bins=14;
  const step=(max-min)/bins;
  const counts = Array(bins).fill(0);
  vals.forEach(v=>{ const i=Math.min(bins-1,Math.floor((v-min)/step)); if(i>=0) counts[i]++; });
  const maxC=Math.max(...counts);
  const xS=i=>(i/bins)*W, yS=c=>H-(c/maxC)*H;
  const barW=W/bins-1;
  const pcts = counts.map((_,i)=>((min+(i+0.5)*step-min)/(max-min)*100));
  return (
    <svg width={width} height={height}>
      <g transform={`translate(${m.left},${m.top})`}>
        <line x1={0} y1={H} x2={W} y2={H} stroke="#ddd"/>
        {counts.map((c,i)=>(
          <rect key={i} x={xS(i)+0.5} y={yS(c)} width={barW} height={H-yS(c)} fill={pctBg(pcts[i])} opacity="0.9"/>
        ))}
        {/* zero line */}
        <line x1={((-min)/(max-min))*W} y1={0} x2={((-min)/(max-min))*W} y2={H+4} stroke="#c00" strokeWidth="1.5" strokeDasharray="4 2"/>
        <text x={((-min)/(max-min))*W} y={H+16} textAnchor="middle" fontSize="10" fill="#c00" fontFamily="IBM Plex Mono">0</text>
        {[-0.0006,-0.0003,0,0.0003].map((v,i)=>(
          <text key={i} x={((v-min)/(max-min))*W} y={H+28} textAnchor="middle" fontSize="10" fill="#999" fontFamily="IBM Plex Mono">{v.toFixed(4)}</text>
        ))}
        {[0,Math.round(maxC/2),maxC].map((c,i)=>(
          <text key={i} x={-6} y={yS(c)+4} textAnchor="end" fontSize="10" fill="#aaa" fontFamily="IBM Plex Mono">{c}</text>
        ))}
        {/* axis labels */}
        <text x={W/2} y={H+44} textAnchor="middle" fontSize="11" fill="#666" fontFamily="IBM Plex Sans, sans-serif">Decay coefficient (per second of shift age)</text>
        <text x={-36} y={H/2} textAnchor="middle" fontSize="11" fill="#666" fontFamily="IBM Plex Sans, sans-serif" transform={`rotate(-90,-36,${H/2})`}>Players</text>
      </g>
    </svg>
  );
};

// ── SCATTER (Base RAPM vs Decay) ──────────────────────────────────────────────
const ScatterPlot = ({players, onSelect, reg, width=360, height=190}) => {
  const [tip, setTip] = React.useState(null);
  const m = {top:12,right:12,bottom:50,left:52};
  const W=width-m.left-m.right, H=height-m.top-m.bottom;
  const xs=players.map(p=>p.decay_coef), ys=players.map(p=>p.base_rapm);
  const xMin=Math.min(...xs)-0.00005, xMax=Math.max(...xs)+0.00005;
  const yMin=Math.min(...ys)-0.005, yMax=Math.max(...ys)+0.005;
  const xS=v=>((v-xMin)/(xMax-xMin))*W;
  const yS=v=>H-((v-yMin)/(yMax-yMin))*H;
  const rl_y1 = reg.slope*xMin + reg.intercept;
  const rl_y2 = reg.slope*xMax + reg.intercept;

  const handleMove = (e, p) => {
    const rect = e.currentTarget.closest('svg').getBoundingClientRect();
    setTip({p, x: e.clientX - rect.left, y: e.clientY - rect.top});
  };

  return (
    <div style={{position:'relative',display:'inline-block'}}>
      <svg width={width} height={height} style={{cursor:'crosshair'}} onMouseLeave={()=>setTip(null)}>
        <g transform={`translate(${m.left},${m.top})`}>
          <line x1={0} y1={yS(0)} x2={W} y2={yS(0)} stroke="#eee"/>
          <line x1={xS(0)} y1={0} x2={xS(0)} y2={H} stroke="#ddd" strokeDasharray="4 2"/>
          <line x1={xS(xMin)} y1={yS(rl_y1)} x2={xS(xMax)} y2={yS(rl_y2)}
            stroke="#8b5cf6" strokeWidth="1.8" strokeDasharray="6 3" opacity="0.85"/>
          {players.map(p=>(
            <circle key={p.id} cx={xS(p.decay_coef)} cy={yS(p.base_rapm)} r="5"
              fill={p.flagged?'#dc2626':'#1d4ed8'} opacity="0.7" stroke="#fff" strokeWidth="1"
              onClick={()=>onSelect(p)} style={{cursor:'pointer'}}
              onMouseEnter={e=>handleMove(e,p)}
              onMouseMove={e=>handleMove(e,p)}
              onMouseLeave={()=>setTip(null)}/>
          ))}
          {[-0.0006,-0.0003,0,0.0003].map((v,i)=>(
            <text key={i} x={xS(v)} y={H+20} textAnchor="middle" fontSize="10" fill="#aaa" fontFamily="IBM Plex Mono">{v.toFixed(4)}</text>
          ))}
          <text x={W/2} y={H+44} textAnchor="middle" fontSize="11" fill="#666" fontFamily="IBM Plex Sans, sans-serif">Decay coefficient (per second of shift age)</text>
          <text x={-40} y={H/2} textAnchor="middle" fontSize="11" fill="#666" fontFamily="IBM Plex Sans, sans-serif" transform={`rotate(-90,-40,${H/2})`}>Base RAPM (xGD/60 at shift start)</text>
          <text x={W} y={13} textAnchor="end" fontSize="10" fill="#8b5cf6" fontFamily="IBM Plex Mono" fontWeight="600">R²={reg.r2.toFixed(3)}</text>
          <g transform={`translate(4,4)`}>
            <circle cx="5" cy="5" r="4" fill="#dc2626" opacity="0.8"/>
            <text x="13" y="9" fontSize="10" fill="#666">Flagged</text>
            <circle cx="5" cy="20" r="4" fill="#1d4ed8" opacity="0.7"/>
            <text x="13" y="24" fontSize="10" fill="#666">Normal</text>
            <line x1="0" y1="35" x2="10" y2="35" stroke="#8b5cf6" strokeWidth="1.8" strokeDasharray="4 2"/>
            <text x="13" y="39" fontSize="10" fill="#8b5cf6">OLS trend</text>
          </g>
        </g>
      </svg>
      {tip && (
        <div style={{
          position:'absolute',
          left: tip.x + 12,
          top:  tip.y - 10,
          background:'#1a1a2e',
          color:'#fff',
          borderRadius:6,
          padding:'8px 11px',
          fontSize:12,
          fontFamily:'IBM Plex Sans, sans-serif',
          pointerEvents:'none',
          whiteSpace:'nowrap',
          boxShadow:'0 4px 16px rgba(0,0,0,0.25)',
          zIndex:999,
        }}>
          <div style={{fontWeight:600,marginBottom:3}}>{tip.p.name} <span style={{opacity:0.6,fontWeight:400}}>({tip.p.team})</span></div>
          <div style={{fontFamily:'IBM Plex Mono',fontSize:11,color:'#a5b4fc'}}>
            Base RAPM: <span style={{color:'#fff'}}>{tip.p.base_rapm.toFixed(4)}</span>
          </div>
          <div style={{fontFamily:'IBM Plex Mono',fontSize:11,color:'#a5b4fc'}}>
            Decay: <span style={{color:'#fff'}}>{tip.p.decay_coef.toFixed(6)}</span>
          </div>
        </div>
      )}
    </div>
  );
};

// ── OVERVIEW PAGE ─────────────────────────────────────────────────────────────
const OverviewPage = ({setPage, setSelectedPlayer}) => {
  const sorted_decay = [...PLAYERS].sort((a,b)=>a.decay_coef-b.decay_coef).slice(0,12);
  const sorted_rapm  = [...PLAYERS].sort((a,b)=>b.base_rapm-a.base_rapm).slice(0,10);
  const medBE = medBreak.length?medBreak[Math.floor(medBreak.length/2)]:null;

  const openPlayer = (p) => { setSelectedPlayer(p); setPage('profile'); };

  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:'32px 24px'}}>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:26,fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>League Overview</h1>
        <p style={{fontSize:13,color:'#888'}}>Shift-age decay analysis across all skaters · 5v5</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:36}}>
        <KPICard label="Players in sample" value={PLAYERS.length} accent="#1d4ed8"/>
        <KPICard label="Overuse flags" value={overuseCount} accent={overuseCount>0?'#dc2626':'#16a34a'} sub={`decay < −0.00035, min 50 min TOI`}/>
        <KPICard label="Avg decay coef" value={avgDecay.toFixed(6)} accent="#8b5cf6" sub="negative = worsens with shift age"/>
        <KPICard label="Median break-even" value={fmtBreak(medBE)} accent="#0891b2"/>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:20,marginBottom:36}}>
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px 24px 16px'}}>
          <SectionHeader title="Distribution of Decay Coefficients" sub="How many skaters fall into each decay rate bucket. A negative decay coefficient means a player's projected impact drops as the shift ages."/>
          <div style={{display:'flex',gap:16,alignItems:'flex-start',marginTop:4,marginBottom:10}}>
            <div style={{fontSize:11,color:'#888',lineHeight:1.5,maxWidth:480}}>
              <span style={{fontWeight:600,color:'#555'}}>X-axis:</span> Decay coefficient — values left of 0 (red dashed line) mean the player gets worse as their shift ages; values right of 0 mean they improve.<br/>
              <span style={{fontWeight:600,color:'#555'}}>Y-axis:</span> Number of players in that bucket.<br/>
              <span style={{fontWeight:600,color:'#555'}}>Color:</span> Red = high decay (negative), blue = low decay (positive).
            </div>
          </div>

const TeamReportPage = ({setPage,setSelectedPlayer}) => {
  const [team, setTeam] = useState(TEAMS[0]||'');
  const roster = PLAYERS.filter(p=>p.team===team).sort((a,b)=>b.toi_min-a.toi_min);
  const flags = roster.filter(p=>p.flagged).length;
  const avgD = roster.length?(roster.reduce((s,p)=>s+p.decay_coef,0)/roster.length).toFixed(6):'N/A';
  const breaks = roster.filter(p=>p.breakeven!=null).map(p=>p.breakeven).sort((a,b)=>a-b);
  const medB = breaks.length?fmtBreak(breaks[Math.floor(breaks.length/2)]):'N/A';

  // Overlay chart for all players on team
  const m={top:14,right:20,bottom:40,left:52};
  const W=560, H=200, cW=W-m.left-m.right, cH=H-m.top-m.bottom;
  const allObs = roster.flatMap(p=>p.obs);
  const yMin=Math.floor(Math.min(...(allObs.length?allObs:[0]),LEAGUE_P25[0])-0.5);
  const yMax=Math.ceil(Math.max(...(allObs.length?allObs:[0]),LEAGUE_P75[0])+0.5);
  const xS=t=>(t/80)*cW, yS=v=>cH-((v-yMin)/(yMax-yMin))*cH;
  const yTicks=[]; for(let v=Math.ceil(yMin);v<=yMax;v+=2)yTicks.push(v);

  const bandPath = [
    ...LEAGUE_P75.map((v,i)=>`${i?'L':'M'} ${xS(AGES[i])} ${yS(v)}`),
    ...LEAGUE_P25.slice().reverse().map((v,i)=>`L ${xS(AGES[AGES.length-1-i])} ${yS(v)}`),
    'Z'
  ].join(' ');

  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:'32px 24px'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <h1 style={{fontSize:26,fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>Team Deployment Report</h1>
          <p style={{fontSize:13,color:'#888'}}>Shift-decay profiles for a single team's skaters</p>
        </div>
        <select value={team} onChange={e=>setTeam(e.target.value)} style={{minWidth:120}}>
          {TEAMS.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:28}}>
        <KPICard label="Players in sample" value={roster.length} accent="#1d4ed8"/>
        <KPICard label="Overuse flags" value={flags} accent={flags>0?'#dc2626':'#16a34a'}/>
        <KPICard label="Team avg decay" value={avgD} accent="#8b5cf6"/>
        <KPICard label="Avg break-even" value={medB} accent="#0891b2"/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:20,marginBottom:20}}>
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
          <SectionHeader title="Decay Curves — All Skaters" sub="Each line = one player. Shaded band = league P25–P75."/>
          <svg width={W} height={H}>
            <g transform={`translate(${m.left},${m.top})`}>
              <path d={bandPath} fill="#e2eaf6" opacity="0.5"/>
              <line x1={0} y1={yS(0)} x2={cW} y2={yS(0)} stroke="#ddd"/>
              {yTicks.map(v=>(
                <g key={v}><line x1={0} y1={yS(v)} x2={cW} y2={yS(v)} stroke="#f2f2f2"/>
                  <text x={-8} y={yS(v)+4} textAnchor="end" fontSize="10" fill="#aaa" fontFamily="IBM Plex Mono">{v}</text></g>
              ))}
              {roster.map(p=>(
                <path key={p.id} d={p.obs.map((v,i)=>`${i?'L':'M'} ${xS(AGES[i])} ${yS(v)}`).join(' ')}
                  stroke={p.flagged?'#dc2626':'#1d4ed8'} strokeWidth="1.5" fill="none" opacity="0.6"/>
              ))}
              {AGES.map(t=>(<text key={t} x={xS(t)} y={cH+20} textAnchor="middle" fontSize="10" fill="#bbb" fontFamily="IBM Plex Mono">{t}</text>))}
              <text x={cW/2} y={cH+36} textAnchor="middle" fontSize="12" fill="#888">Shift age (seconds)</text>
            </g>
          </svg>
        </div>
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
          <SectionHeader title="Break-even Distribution" sub="Shift age where each player projects to 0 xGD/60."/>
          <div style={{marginTop:8}}>
            {roster.sort((a,b)=>(a.breakeven??9999)-(b.breakeven??9999)).map(p=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                <button onClick={()=>{setSelectedPlayer(p);setPage('profile');}} style={{fontSize:12,fontWeight:600,color:'#1d4ed8',minWidth:120,textAlign:'left'}}>{p.name}</button>
                <div style={{flex:1,height:6,background:'#f0f0f0',borderRadius:3,overflow:'hidden'}}>
                  {p.breakeven && <div style={{width:`${Math.min(100,(p.breakeven/120)*100)}%`,height:'100%',background:pctBg(p.pct_decay),borderRadius:3}}/>}
                </div>
                <span style={{fontSize:11,fontFamily:'IBM Plex Mono',color:'#888',minWidth:44,textAlign:'right'}}>{fmtBreak(p.breakeven)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:6,padding:'20px'}}>
        <SectionHeader title="Roster Breakdown" sub="Click a player name to open their full profile."/>
        <table>
          <thead><tr>
            <th style={{textAlign:'left'}}>Player</th><th>Pos</th><th>Base RAPM</th><th>Decay</th><th>Early xGD</th><th>Late xGD</th><th>TOI (min)</th><th>Break-even</th><th>Flagged</th>
          </tr></thead>
          <tbody>{roster.map(p=>(
            <tr key={p.id}>
              <td><button onClick={()=>{setSelectedPlayer(p);setPage('profile');}} style={{color:'#1d4ed8',fontWeight:600,fontSize:13}}>{p.name}</button></td>
              <td style={{textAlign:'center',color:'#888',fontSize:12}}>{p.pos}</td>
              <PctCell pct={p.pct_rapm} value={fmt(p.base_rapm,4)}/>
              <PctCell pct={p.pct_decay} value={p.decay_coef.toFixed(6)}/>
              <PctCell pct={p.pct_early} value={fmt(p.early)}/>
              <PctCell pct={p.pct_late} value={fmt(p.late)}/>
              <td style={{fontFamily:'IBM Plex Mono',fontSize:12}}>{p.toi_min}</td>
              <td style={{fontFamily:'IBM Plex Mono',fontSize:12}}>{fmtBreak(p.breakeven)}</td>
              <td style={{textAlign:'center'}}>{p.flagged?<Tag bg="#fee2e2" color="#dc2626">⚠ Yes</Tag>:<span style={{color:'#aaa',fontSize:12}}>—</span>}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
};

// ── APP ────────────────────────────────────────────────────────────────────────
const App = () => {
  const urlParams = new URLSearchParams(window.location.search);
  const urlSeason = urlParams.get('season') || window.__DATA__.current_season;

  const [page, setPage] = useState(() => localStorage.getItem('hk_page')||'overview');
  const [selectedPlayer, setSelectedPlayer] = useState(null);

  useEffect(()=>{ localStorage.setItem('hk_page', page); }, [page]);

  const onSeasonChange = (s) => {
    window.location.href = '/?season=' + s;
  };

  const goPage = (p) => setPage(p);

  const breadcrumbs = {
    overview: [{label:'League Overview'}],
    players:  [{label:'League Overview', onClick:()=>goPage('overview')},{label:'Players'}],
    profile:  [{label:'League Overview',onClick:()=>goPage('overview')},{label:'Players',onClick:()=>goPage('players')},{label:selectedPlayer?.name||'Profile'}],
    lines:    [{label:'League Overview',onClick:()=>goPage('overview')},{label:'Lines'}],
    team:     [{label:'League Overview',onClick:()=>goPage('overview')},{label:'Team Report'}],
  };

  return (
    <div style={{minHeight:'100vh',background:'#f8f8f7'}}>
      <TopNav page={page==='profile'?'players':page} setPage={goPage} season={urlSeason} onSeasonChange={onSeasonChange} breadcrumb={breadcrumbs[page]}/>
      {page==='overview' && <OverviewPage setPage={goPage} setSelectedPlayer={setSelectedPlayer}/>}
      {page==='players'  && <PlayersPage setPage={goPage} setSelectedPlayer={setSelectedPlayer} selectedPlayer={selectedPlayer}/>}
      {page==='profile'  && <PlayerProfile player={selectedPlayer} setPage={goPage}/>}
      {page==='lines'    && <LinesPage/>}
      {page==='team'     && <TeamReportPage setPage={goPage} setSelectedPlayer={setSelectedPlayer}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
